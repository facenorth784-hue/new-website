      $(".pagetransition").click(function (e) {

          function (url) {

    <script>
      // 淇鍏充簬鎴戦〉闈腑鐨?AI 璁捐鍒涙柊婊氬姩鍔ㄧ敾鏁堟灉
      document.addEventListener("DOMContentLoaded", function() {
        const headline = document.querySelector(".headline-verticals.center");
        const container = document.querySelector(".worksnake-wrapper");
        
        if (headline && container) {
          headline.style.transition = 'transform 0.1s linear';
          headline.style.willChange = 'transform';
          
          function updateScroll() {
            const rect = container.getBoundingClientRect();
            const viewHeight = window.innerHeight;
            
            // 褰撳鍣ㄨ繘鍏ヨ鍙ｆ椂寮€濮嬭绠楄繘搴?
            if (rect.top < viewHeight && rect.bottom > 0) {
              const totalHeight = viewHeight + rect.height;
              const scrolled = viewHeight - rect.top;
              const progress = scrolled / totalHeight;
              
              // 鏄犲皠鍒板叿浣撶殑绾靛悜浣嶇Щ (妯℃嫙棣栭〉鐨勬粴鍔ㄨ寖鍥达紝閫傞厤鏂囧瓧楂樺害)
              const moveRange = 500; 
              const translateY = -50 - (progress * moveRange);
              
              headline.style.transform = `translate3d(0px, ${translateY}px, 0px)`;
            }
          }
          
          window.addEventListener("scroll", updateScroll);
          updateScroll();
        }
      });
    </script>
    <script src="js/splide.min.js"></script>
    <script>
      function sliderprocess() {
        let splides = $(".sliderprocess");
        for (let i = 0, splideLength = splides.length; i < splideLength; i++) {
          new Splide(splides[i], {
            // Desktop on down
            perPage: 4,
            perMove: 1,
            focus: 0, // 0 = left and 'center' = center
            type: "slide", // 'loop' or 'slide'
            gap: "1.5em", // space between slides
            arrows: "slider", // 'slider' or false
            pagination: "slider", // 'slider' or false
            speed: 600, // transition speed in miliseconds
            dragAngleThreshold: 30, // default is 30
            autoWidth: false, // for cards with differing widths
            rewind: false, // go back to beginning when reach end
            rewindSpeed: 400,
            waitForTransition: false,
            updateOnMove: true,
            trimSpace: true, // true removes empty space from end of list
            breakpoints: {
              3000: {
                // Custom inbetween
                perPage: 2.1,
              },
              2000: {
                // Custom inbetween
                perPage: 2.1,
              },
              1600: {
                // Custom inbetween
                perPage: 1.1,
              },
              991: {
                // Tablet
                perPage: 1.1,
              },
              767: {
                // Mobile Landscape
                perPage: 1.1,
              },
              479: {
                // Mobile Portrait
                perPage: 1.1,
              },
            },
          }).mount();
        }
      }
      sliderprocess();
    </script>

    <script src="js/gsap.min.js"></script>
    <script src="js/CustomEase.min.js"></script>

    <script>
      // Pre-loader
      // Variables
      // Custom ease
      let customEase =
        "M0,0,C0,0,0.13,0.34,0.238,0.442,0.305,0.506,0.322,0.514,0.396,0.54,0.478,0.568,0.468,0.56,0.522,0.584,0.572,0.606,0.61,0.719,0.714,0.826,0.798,0.912,1,1,1,1";
      // Counter start
      let counter = {
        value: 0,
      };
      // Duration
      let loaderDuration = 0.2;

      // Duration, and counter start - if not a first time visit in this tab
      if (sessionStorage.getItem("visited") !== null) {
        loaderDuration = 0.2;
        counter = {
          value: 80,
        };
      }
      sessionStorage.setItem("visited", "true");

      function updateLoaderText() {
        let progress = Math.round(counter.value);
        $(".page-loader_text").text(progress);
      }
      function endLoaderAnimation() {
        $(".page-loader_trigger").click();
      }

      let tl = gsap.timeline({
        onComplete: endLoaderAnimation,
      });
      tl.to(counter, {
        value: 100,
        onUpdate: updateLoaderText,
        duration: loaderDuration,
        ease: CustomEase.create("custom", customEase),
      });
      tl.to(
        ".page-loader_text-fill",
        {
          height: "100%",
          duration: loaderDuration,
          ease: CustomEase.create("custom", customEase),
        },
        0,
      );
    </script>
